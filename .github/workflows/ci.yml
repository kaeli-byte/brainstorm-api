name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Lint, build, test (in-memory)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Ignore any DATABASE_URL on the runner so API tests use in-memory persistence only.
      DATABASE_URL: ""
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.2

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Dependency audit (high+)
        run: pnpm audit --audit-level high

      - name: Typecheck & compile
        run: pnpm build

      - name: Unit & API tests
        run: pnpm test
        env:
          NODE_ENV: test
          USE_FAKE_LLM: "true"
          GEMINI_API_KEY: ci-placeholder

  postgres:
    name: Migrations + tests (Postgres)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: brainstorm
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d brainstorm"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/brainstorm
      NODE_ENV: test
      USE_FAKE_LLM: "true"
      GEMINI_API_KEY: ci-placeholder

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.2

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply SQL migrations
        run: pnpm db:migrate

      - name: Typecheck & compile
        run: pnpm build

      - name: Full test suite against Postgres
        run: pnpm test

  container:
    name: Docker image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [quality]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: brainstorm-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
